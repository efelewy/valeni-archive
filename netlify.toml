[build]
  command = "npm run build"
  publish = "dist"

# react-router client-side routing için: doğrudan /admin gibi bir URL'e
# gidildiğinde Netlify'ın 404 vermemesi, index.html'i sunup yönlendirmeyi
# React Router'a bırakması gerekir.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
